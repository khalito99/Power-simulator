<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Power Simulator RPG</title>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
  text-align:center;
}

h1 {
  background:linear-gradient(90deg,purple,blue);
  padding:20px;
}

#game {
  margin-top:30px;
}

.bar {
  width:200px;
  height:20px;
  background:#333;
  margin:5px auto;
  border-radius:10px;
}

.fill {
  height:100%;
  background:lime;
  border-radius:10px;
}

.enemyFill {
  background:red;
}

button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:purple;
  color:white;
  font-size:16px;
}
</style>
</head>

<body>

<h1>⚡ POWER SIMULATOR RPG ⚡</h1>

<div id="game">

<h2>Player</h2>
<p>Level: <span id="level">1</span> | XP: <span id="xp">0</span></p>

<p>HP</p>
<div class="bar"><div id="hpBar" class="fill"></div></div>

<p>Energy</p>
<div class="bar"><div id="energyBar" class="fill"></div></div>

<h2>Enemy</h2>
<p id="enemyName">Normal Enemy</p>

<div class="bar"><div id="enemyBar" class="fill enemyFill"></div></div>

<br>

<button onclick="attack()">⚔️ Attack</button>
<button onclick="power()">⚡ Power</button>
<button onclick="ultimate()">🔥 Ultimate</button>

</div>

<script>

let level = 1
let xp = 0

let maxHP = 100
let hp = 100

let maxEnergy = 100
let energy = 100

let enemyHP = 100
let enemyMaxHP = 100

let boss = false

function attack(){
  let dmg = rand(10,20)
  enemyHP -= dmg
  energy += 5
  enemyTurn()
  checkEnemy()
  update()
}

function power(){
  if(energy < 20){
    alert("Not enough energy!")
    return
  }
  let dmg = rand(30,50)
  enemyHP -= dmg
  energy -= 20
  enemyTurn()
  checkEnemy()
  update()
}

function ultimate(){
  if(energy < 50){
    alert("Not enough energy!")
    return
  }
  let dmg = rand(70,100)
  enemyHP -= dmg
  energy -= 50
  enemyTurn()
  checkEnemy()
  update()
}

function enemyTurn(){
  let dmg = rand(5,15)
  hp -= dmg
  if(hp <= 0){
    alert("You died! Respawning...")
    hp = maxHP
    xp = 0
    level = 1
  }
}

function checkEnemy(){
  if(enemyHP <= 0){
    xp += boss ? 100 : 40

    if(xp >= 100){
      xp = 0
      level++
      maxHP += 20
      maxEnergy += 20
      hp = maxHP
      energy = maxEnergy
      alert("LEVEL UP!")
    }

    spawnEnemy()
  }
}

function spawnEnemy(){
  if(level % 5 === 0){
    boss = true
    enemyMaxHP = 300 + level*20
    document.getElementById("enemyName").innerText = "👑 BOSS"
  } else {
    boss = false
    enemyMaxHP = 100 + level*10
    document.getElementById("enemyName").innerText = "Enemy"
  }

  enemyHP = enemyMaxHP
}

function update(){
  document.getElementById("level").innerText = level
  document.getElementById("xp").innerText = xp

  document.getElementById("hpBar").style.width = (hp/maxHP*100)+"%"
  document.getElementById("energyBar").style.width = (energy/maxEnergy*100)+"%"
  document.getElementById("enemyBar").style.width = (enemyHP/enemyMaxHP*100)+"%"
}

function rand(min,max){
  return Math.floor(Math.random()*(max-min+1))+min
}

spawnEnemy()
update()

</script>

</body>
</html>
