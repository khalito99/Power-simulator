<!DOCTYPE html>
<html>
<head>
<title>Power Simulator RPG</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(black, #0a0a2a);
  color: white;
  text-align: center;
}

header {
  padding: 40px;
  font-size: 40px;
  font-weight: bold;
  background: linear-gradient(90deg, purple, blue);
}

.hero {
  padding: 80px 20px;
}

.hero h1 {
  font-size: 50px;
}

.button {
  padding: 15px 30px;
  background: purple;
  border: none;
  color: white;
  font-size: 20px;
  border-radius: 10px;
}

.section {
  padding: 40px;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  margin: 10px;
  border-radius: 15px;
  display: inline-block;
  width: 250px;
}

footer {
  padding: 20px;
  background: black;
}
</style>
</head>

<body>

<header>
⚡ POWER SIMULATOR RPG ⚡
</header>

<div class="hero">
  <h1>Become The Strongest</h1>
  <p>Explore seas, unlock powers, defeat bosses.</p>
  <button class="button">Play</button>
</div>

<div class="section">
  <h2>🔥 Features</h2>
  <div class="card">⚡ Powers System</div>
  <div class="card">👑 Boss Battles</div>
  <div class="card">🌍 4 Seas</div>
  <div class="card">⚔️ PvP</div>
</div>

<div class="section">
  <h2>🌟 Rarities</h2>
  <p>Common → Rare → Epic → Legendary → Mythical → Divine → Legend</p>
</div>

<footer>
© Power Simulator RPG
</footer>

</body>
</html>
